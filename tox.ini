[tox]
envlist = py3
          formatting
          typing
          coverage
          docs

[testenv]
description = Run py- and doctsts
deps = pytest
       mypy
commands = pytest tests

[testenv:formatting]
description = Check code formatting using black 
deps = black>=25,<26
commands = black --check src tests

[testenv:typing]
description = Check static typing using mypy
deps = mypy
       pytest
       svg.py
       types-setuptools
       flask
commands = mypy --strict --ignore-missing-imports src tests

[testenv:coverage]
description = Calculate test coverage coverage
deps = coverage
       pytest
       svg.py
       mypy
commands =
  coverage run -m pytest tests
  coverage html
  coverage xml

[testenv:docs]
deps = -r docs/requirements.txt
allowlist_externals=make
commands = make -C docs/ html
